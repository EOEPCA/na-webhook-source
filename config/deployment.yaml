apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhook-source
  labels:
    app: webhook-source
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-source
  labels:
    app: webhook-source
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-source
  template:
    metadata:
      labels:
        app: webhook-source
    spec:
      serviceAccountName: webhook-source
      containers:
      - name: webhook-source
        image: webhook-source:latest
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        - name: GITHUB_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: webhook-secrets
              key: github-secret
              optional: true
        - name: GITLAB_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: webhook-secrets
              key: gitlab-secret
              optional: true
        - name: OIDC_TOKEN_PATH
          value: "/var/run/secrets/kubernetes.io/serviceaccount/token"
        - name: PROJECTS_CONFIG
          valueFrom:
            configMapKeyRef:
              name: webhook-projects-config
              key: projects.json
              optional: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-source
  labels:
    app: webhook-source
spec:
  selector:
    app: webhook-source
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
